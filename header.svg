<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 310" width="880" height="310">
  <defs>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%">
        <animate attributeName="stop-color" values="#7dd3fc;#67e8f9;#5eead4;#7dd3fc" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%">
        <animate attributeName="stop-color" values="#67e8f9;#5eead4;#7dd3fc;#67e8f9" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%">
        <animate attributeName="stop-color" values="#5eead4;#7dd3fc;#67e8f9;#5eead4" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="statusGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="tabAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="880" height="310" rx="12"/>
    </clipPath>
  </defs>

  <style>
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes lineHl { 0%,100%{opacity:.035} 50%{opacity:.08} }
    @keyframes borderPulse { 0%,100%{stroke-opacity:.25} 50%{stroke-opacity:.6} }
    @keyframes particle { 0%,100%{opacity:0} 50%{opacity:.6} }
    @keyframes particle2 { 0%,100%{opacity:0} 40%{opacity:.4} }
    .cursor { animation: blink 1.1s step-end infinite; }
    .line-hl { animation: lineHl 3s ease-in-out infinite; }
    .border-glow { animation: borderPulse 4s ease-in-out infinite; }
    .p1 { animation: particle 5s ease-in-out infinite; }
    .p2 { animation: particle2 7s ease-in-out infinite; }
    text { font-family: 'JetBrains Mono','Fira Code','SF Mono','Cascadia Code','Consolas','Courier New',monospace; }
  </style>

  <g clip-path="url(#clip)">
    <!-- Editor background -->
    <rect width="880" height="310" fill="#1e1e2e"/>

    <!-- Subtle animated scanline -->
    <rect width="880" height="2" fill="#22d3ee" opacity=".02">
      <animateTransform attributeName="transform" type="translate" values="0,-20;0,320" dur="10s" repeatCount="indefinite"/>
    </rect>

    <!-- Floating particles in empty areas -->
    <circle cx="720" cy="88" r="1.2" fill="#89b4fa" class="p1"/>
    <circle cx="790" cy="155" r="1" fill="#38bdf8" class="p2" style="animation-delay:-2s"/>
    <circle cx="680" cy="195" r="0.8" fill="#22d3ee" class="p1" style="animation-delay:-3.5s"/>
    <circle cx="810" cy="220" r="1.1" fill="#89dceb" class="p2" style="animation-delay:-1s"/>
    <circle cx="750" cy="260" r="0.9" fill="#a6e3a1" class="p1" style="animation-delay:-4s"/>
    <circle cx="830" cy="70" r="0.7" fill="#f9e2af" class="p2" style="animation-delay:-5s"/>
    <circle cx="650" cy="250" r="1" fill="#5eead4" class="p1" style="animation-delay:-2.5s"/>
    <circle cx="770" cy="110" r="0.8" fill="#38bdf8" class="p2" style="animation-delay:-0.5s"/>

    <!-- ═══ Title bar ═══ -->
    <rect width="880" height="40" fill="#181825"/>
    <line x1="0" y1="40" x2="880" y2="40" stroke="#313244" stroke-width="1"/>

    <!-- Traffic light dots -->
    <circle cx="20" cy="20" r="6.5" fill="#e5484d"/>
    <circle cx="40" cy="20" r="6.5" fill="#f9e2af"/>
    <circle cx="60" cy="20" r="6.5" fill="#a6e3a1"/>

    <!-- Active tab -->
    <rect x="82" y="0" width="240" height="40" fill="#1e1e2e"/>
    <rect x="82" y="0" width="240" height="2.5" fill="url(#tabAccent)"/>
    <line x1="82" y1="0" x2="82" y2="40" stroke="#313244" stroke-width=".5"/>
    <line x1="322" y1="0" x2="322" y2="40" stroke="#313244" stroke-width=".5"/>

    <!-- Tab content: TS icon + filename -->
    <rect x="96" y="11" width="20" height="14" rx="2" fill="#3178c6"/>
    <text x="106" y="23" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">TS</text>
    <text x="124" y="25" font-size="12.5" fill="#cdd6f4">saket_ramsinghani.ts</text>

    <!-- Inactive tab -->
    <rect x="322" y="0" width="140" height="40" fill="#11111b"/>
    <line x1="462" y1="0" x2="462" y2="40" stroke="#313244" stroke-width=".5"/>
    <text x="346" y="25" font-size="12.5" fill="#585b70">README.md</text>

    <!-- ═══ Line number gutter ═══ -->
    <rect x="0" y="40" width="50" height="244" fill="#11111b" opacity=".6"/>
    <line x1="50" y1="40" x2="50" y2="284" stroke="#313244" stroke-width=".5"/>

    <!-- Current line highlight (line 4 - the name) -->
    <rect x="0" y="120" width="880" height="22" fill="#22d3ee" class="line-hl"/>

    <!-- Git modified indicator on line 4 -->
    <rect x="49" y="121" width="2" height="20" fill="#a6e3a1" rx="1"/>

    <!-- ═══ Line numbers ═══ -->
    <text x="38" y="70" font-size="12.5" fill="#585b70" text-anchor="end">1</text>
    <text x="38" y="92" font-size="12.5" fill="#585b70" text-anchor="end">2</text>
    <text x="38" y="114" font-size="12.5" fill="#585b70" text-anchor="end">3</text>
    <text x="38" y="136" font-size="12.5" fill="#cdd6f4" text-anchor="end">4</text>
    <text x="38" y="158" font-size="12.5" fill="#585b70" text-anchor="end">5</text>
    <text x="38" y="180" font-size="12.5" fill="#585b70" text-anchor="end">6</text>
    <text x="38" y="202" font-size="12.5" fill="#585b70" text-anchor="end">7</text>
    <text x="38" y="224" font-size="12.5" fill="#585b70" text-anchor="end">8</text>
    <text x="38" y="246" font-size="12.5" fill="#585b70" text-anchor="end">9</text>
    <text x="38" y="268" font-size="12.5" fill="#585b70" text-anchor="end">10</text>

    <!-- ═══ Code content ═══ -->

    <!-- Line 1: comment -->
    <text x="62" y="70" font-size="13.5" fill="#6c7086" font-style="italic">// Welcome to my GitHub Profile</text>

    <!-- Line 2: empty -->

    <!-- Line 3: const saket: Developer = { -->
    <text x="62" y="114" font-size="13.5"><tspan fill="#7dd3fc">const </tspan><tspan fill="#fab387">saket</tspan><tspan fill="#89dceb">: </tspan><tspan fill="#f9e2af">Developer</tspan><tspan fill="#89dceb"> = </tspan><tspan fill="#cdd6f4">{</tspan></text>

    <!-- Line 4: name (THE HIGHLIGHT LINE) -->
    <text x="78" y="136" font-size="13.5"><tspan fill="#74c7ec">name</tspan><tspan fill="#89dceb">: </tspan><tspan fill="url(#nameGrad)">"Saket Ramsinghani"</tspan><tspan fill="#cdd6f4">,</tspan></text>

    <!-- Line 5: role -->
    <text x="78" y="158" font-size="13.5"><tspan fill="#74c7ec">role</tspan><tspan fill="#89dceb">: </tspan><tspan fill="#a6e3a1">"Software Engineer"</tspan><tspan fill="#cdd6f4">,</tspan></text>

    <!-- Line 6: passion -->
    <text x="78" y="180" font-size="13.5"><tspan fill="#74c7ec">passion</tspan><tspan fill="#89dceb">: </tspan><tspan fill="#a6e3a1">"Building elegant solutions"</tspan><tspan fill="#cdd6f4">,</tspan></text>

    <!-- Line 7: stack -->
    <text x="78" y="202" font-size="13.5"><tspan fill="#74c7ec">stack</tspan><tspan fill="#89dceb">: </tspan><tspan fill="#f9e2af">[</tspan><tspan fill="#a6e3a1">"Java"</tspan><tspan fill="#cdd6f4">, </tspan><tspan fill="#a6e3a1">"TypeScript"</tspan><tspan fill="#cdd6f4">, </tspan><tspan fill="#a6e3a1">"Python"</tspan><tspan fill="#f9e2af">]</tspan><tspan fill="#cdd6f4">,</tspan></text>

    <!-- Line 8: closing brace -->
    <text x="62" y="224" font-size="13.5" fill="#cdd6f4">};</text>

    <!-- Line 9: empty -->

    <!-- Line 10: method call -->
    <text x="62" y="268" font-size="13.5"><tspan fill="#fab387">saket</tspan><tspan fill="#cdd6f4">.</tspan><tspan fill="#74c7ec">build</tspan><tspan fill="#f9e2af">(</tspan><tspan fill="#f9e2af">)</tspan><tspan fill="#cdd6f4">;</tspan></text>

    <!-- Blinking cursor -->
    <rect x="170" y="255" width="9" height="17" fill="#cdd6f4" rx="1" class="cursor"/>

    <!-- ═══ Status bar ═══ -->
    <rect x="0" y="284" width="880" height="26" fill="#181825"/>
    <line x1="0" y1="284" x2="880" y2="284" stroke="#313244" stroke-width=".5"/>

    <!-- Status bar left: branch pill -->
    <rect x="0" y="284" width="90" height="26" fill="url(#statusGrad)"/>
    <text x="14" y="301" font-size="11" fill="#fff" font-weight="600">main *</text>

    <!-- Status bar items -->
    <text x="108" y="301" font-size="10.5" fill="#585b70">Ln 10, Col 15</text>
    <text x="220" y="301" font-size="10.5" fill="#585b70">Spaces: 2</text>

    <!-- Status bar right items -->
    <text x="680" y="301" font-size="10.5" fill="#585b70">UTF-8</text>
    <text x="735" y="301" font-size="10.5" fill="#585b70">LF</text>
    <rect x="770" y="290" width="14" height="10" rx="1.5" fill="#3178c6"/>
    <text x="777" y="299" font-size="7" fill="#fff" text-anchor="middle" font-weight="700">TS</text>
    <text x="790" y="301" font-size="10.5" fill="#74c7ec">TypeScript</text>
    <text x="862" y="301" font-size="10.5" fill="#a6e3a1">Prettier</text>
  </g>

  <!-- Outer border with glow -->
  <rect width="880" height="310" rx="12" fill="none" stroke="url(#borderGrad)" stroke-width="1.5" class="border-glow"/>
</svg>
