<svg xmlns="http://www.w3.org/2000/svg" width="700" height="120" viewBox="0 0 700 120" role="img" aria-label="Contribution streak card">
  <rect x="0.5" y="0.5" width="699" height="119" rx="12" fill="#ffffff" stroke="#d0d7de"/>
  <text x="24" y="34" font-family="Segoe UI,Arial,sans-serif" font-size="22" font-weight="700" fill="#24292f">Contribution Streak</text>
  <text x="24" y="55" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#57606a">Based on the current GitHub contribution calendar snapshot</text>
  <g font-family="Segoe UI,Arial,sans-serif" text-anchor="middle">
    <rect x="24" y="70" width="200" height="32" rx="10" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="124" y="90" font-size="12" fill="#57606a">Current Streak</text>
    <text x="124" y="100" font-size="18" font-weight="700" fill="#24292f">1 day</text>

    <rect x="250" y="70" width="200" height="32" rx="10" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="350" y="90" font-size="12" fill="#57606a">Longest Streak</text>
    <text x="350" y="100" font-size="18" font-weight="700" fill="#24292f">2 days</text>

    <rect x="476" y="70" width="200" height="32" rx="10" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="576" y="90" font-size="12" fill="#57606a">Last-Year Contributions</text>
    <text x="576" y="100" font-size="18" font-weight="700" fill="#24292f">25</text>
  </g>
</svg>