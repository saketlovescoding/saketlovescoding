<svg xmlns="http://www.w3.org/2000/svg" width="495" height="170" viewBox="0 0 495 170" role="img" aria-label="GitHub stats card">
  <rect x="0.5" y="0.5" width="494" height="169" rx="12" fill="#ffffff" stroke="#d0d7de"/>
  <text x="20" y="32" font-family="Segoe UI,Arial,sans-serif" font-size="22" font-weight="700" fill="#24292f">GitHub Stats</text>
  <text x="20" y="52" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#57606a">Repository-hosted snapshot to avoid broken external widgets</text>
  <g font-family="Segoe UI,Arial,sans-serif">
    <rect x="20" y="68" width="140" height="38" rx="10" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="34" y="88" font-size="12" fill="#57606a">Public Repositories</text>
    <text x="34" y="101" font-size="18" font-weight="700" fill="#24292f">6</text>

    <rect x="177" y="68" width="140" height="38" rx="10" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="191" y="88" font-size="12" fill="#57606a">Followers / Following</text>
    <text x="191" y="101" font-size="18" font-weight="700" fill="#24292f">1 / 27</text>

    <rect x="334" y="68" width="141" height="38" rx="10" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="348" y="88" font-size="12" fill="#57606a">Stars / Forks</text>
    <text x="348" y="101" font-size="18" font-weight="700" fill="#24292f">0 / 0</text>

    <rect x="20" y="116" width="140" height="38" rx="10" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="34" y="136" font-size="12" fill="#57606a">Contributions (12 mo)</text>
    <text x="34" y="149" font-size="18" font-weight="700" fill="#24292f">25</text>

    <rect x="177" y="116" width="140" height="38" rx="10" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="191" y="136" font-size="12" fill="#57606a">Active Days</text>
    <text x="191" y="149" font-size="18" font-weight="700" fill="#24292f">13</text>

    <rect x="334" y="116" width="141" height="38" rx="10" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="348" y="136" font-size="12" fill="#57606a">Current / Longest Streak</text>
    <text x="348" y="149" font-size="18" font-weight="700" fill="#24292f">1 / 2 days</text>
  </g>
</svg>